# docker-compose.prod.yml
# Used by GitHub Actions to deploy on EC2
# Images are pulled from ECR instead of built locally

services:

  fastapi:
    image: ${ECR_REGISTRY}/equityiq-api:${IMAGE_TAG:-latest}
    container_name: equityiq_api
    env_file: .env
    environment:
      - APP_ENV=production
    networks:
      - equityiq_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    image: ${ECR_REGISTRY}/equityiq-ui:${IMAGE_TAG:-latest}
    container_name: equityiq_ui
    env_file: .env
    environment:
      - APP_ENV=production
      - API_BASE_URL=http://fastapi:8000
    networks:
      - equityiq_net
    depends_on:
      fastapi:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: equityiq_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - equityiq_net
    restart: always

networks:
  equityiq_net:
    driver: bridge