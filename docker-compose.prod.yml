# docker-compose.prod.yml — EC2 PRODUCTION
#
# Key differences from dev:
#   - No volume mounts (code is baked into the image)
#   - Images pulled from ECR
#   - restart: always (survives reboots)
#   - Nginx uses prod config with SSL
#
# Usage on EC2:
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d

version: "3.9"

services:

  fastapi:
    # ECR_REGISTRY and IMAGE_TAG set by GitHub Actions
    image: ${ECR_REGISTRY}/equityiq-api:${IMAGE_TAG:-latest}
    container_name: equityiq_api
    env_file: .env
    environment:
      - APP_ENV=production
    networks:
      - equityiq_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    image: ${ECR_REGISTRY}/equityiq-ui:${IMAGE_TAG:-latest}
    container_name: equityiq_ui
    env_file: .env
    environment:
      - APP_ENV=production
      # In Docker, fastapi is the service name
      - API_BASE_URL=http://fastapi:8000
    networks:
      - equityiq_net
    depends_on:
      fastapi:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: equityiq_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certs — generated on EC2 by Certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - equityiq_net
    depends_on:
      - fastapi
      - streamlit
    restart: always

networks:
  equityiq_net:
    driver: bridge