# nginx/nginx.prod.conf — EC2 PRODUCTION
#
# Differences from dev:
#   - Listens on 443 with SSL cert from Let's Encrypt
#   - Redirects HTTP (80) to HTTPS (443)
#
# Before using this:
#   1. Replace YOUR_DOMAIN with your actual domain or EC2 DNS
#   2. Run Certbot to get SSL cert:
#      sudo certbot certonly --standalone -d YOUR_DOMAIN

events {
    worker_connections 1024;
}

http {

    upstream fastapi_backend {
        server fastapi:8000;
    }

    upstream streamlit_frontend {
        server streamlit:8501;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name YOUR_DOMAIN;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;

        # Let's Encrypt certificate paths
        ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 180s;
        }

        location / {
            proxy_pass http://streamlit_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}