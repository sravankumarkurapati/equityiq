# nginx/nginx.dev.conf — LOCAL DEVELOPMENT
#
# Routes all traffic through one port (80):
#   /api/* → FastAPI  (port 8000)
#   /*     → Streamlit (port 8501)
#
# This mirrors production so local testing is accurate.

events {
    worker_connections 1024;
}

http {

    upstream fastapi_backend {
        server fastapi:8000;
    }

    upstream streamlit_frontend {
        server streamlit:8501;
    }

    server {
        listen 80;
        server_name localhost;

        # Route /api/* to FastAPI
        # DO NOT strip the /api prefix — FastAPI expects it
        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
        }

        # Route everything else to Streamlit
        location / {
            proxy_pass http://streamlit_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}